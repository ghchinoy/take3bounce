<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <title>Three-Up TTS Generator</title>
    <style>
      :root {
        --md-sys-color-primary: #8ff5ff;
        --md-sys-color-on-primary: #000000;
        --md-sys-color-primary-container: #004a52;
        --md-sys-color-on-primary-container: #8ff5ff;
        --md-sys-color-secondary: #c97cff;
        --md-sys-color-on-secondary: #000000;
        --md-sys-color-surface: #0e0e0f;
        --md-sys-color-on-surface: #ffffff;
        --md-sys-color-surface-variant: #1c1c1e;
        --md-sys-color-on-surface-variant: #e0e0e0;
        --md-sys-color-surface-container-lowest: #0e0e0f;
        --md-sys-color-surface-container-low: #1c1c1e;
        --md-sys-color-surface-container: #242426;
        --md-sys-color-surface-container-high: #2c2c2e;
        --md-sys-color-surface-container-highest: #333333;
        --md-sys-color-outline: #888888;
        --md-sys-color-outline-variant: #444444;
        --md-sys-color-error: #ff6b6b;
      }
      body {
        margin: 0;
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body>
    <app-main></app-main>
    <script type="module" src="/src/app-main.ts"></script>
  </body>
</html>
