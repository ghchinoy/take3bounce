<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Tag Showcase</title>
    <style>
      :root {
        /* Base Variables (Dark Theme Default: Precision Brutalism) */
        --theme-font-body: 'Google Sans', sans-serif;
        --theme-font-headline: 'Google Sans', sans-serif;
        --theme-radius-card: 12px;
        --theme-radius-button: 8px;
        --theme-shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4);
        --theme-border-card: none;
        
        --md-sys-color-primary: #8ff5ff;
        --md-sys-color-on-primary: #000000;
        --md-sys-color-primary-container: #004a52;
        --md-sys-color-on-primary-container: #8ff5ff;
        --md-sys-color-secondary: #c97cff;
        --md-sys-color-on-secondary: #000000;
        --md-sys-color-surface: #0e0e0f;
        --md-sys-color-on-surface: #ffffff;
        --md-sys-color-surface-variant: #1c1c1e;
        --md-sys-color-on-surface-variant: #e0e0e0;
        --md-sys-color-surface-container-lowest: #000000;
        --md-sys-color-surface-container-low: #1c1c1e;
        --md-sys-color-surface-container: #242426;
        --md-sys-color-surface-container-high: #2c2c2e;
        --md-sys-color-surface-container-highest: #333333;
        --md-sys-color-outline: #888888;
        --md-sys-color-outline-variant: #444444;
        --md-sys-color-error: #ff6b6b;
      }

      .light-theme {
        /* Light Theme Overrides (Sunrise Studio) */
        --theme-font-body: 'Google Sans', sans-serif;
        --theme-font-headline: 'Google Sans', sans-serif;
        --theme-radius-card: 9999px; /* Very rounded or 24px as per soft feel */
        --theme-radius-button: 16px;
        --theme-shadow-card: 0 4px 12px rgba(0, 0, 0, 0.05);
        --theme-border-card: 1px solid #E0E0E0;

        --md-sys-color-primary: #4285F4; /* Bright Blue */
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-primary-container: #D6E4FF;
        --md-sys-color-on-primary-container: #0040B5;
        
        --md-sys-color-secondary: #4CAF50; /* Friendly Green */
        --md-sys-color-on-secondary: #ffffff;
        
        --md-sys-color-tertiary: #03A9F4; /* Bright Blue */
        --md-sys-color-on-tertiary: #ffffff;
        
        --md-sys-color-surface: #FAFAFA;
        --md-sys-color-on-surface: #111111;
        --md-sys-color-surface-variant: #F5F5F5;
        --md-sys-color-on-surface-variant: #444444;
        
        --md-sys-color-surface-container-lowest: #FFFFFF;
        --md-sys-color-surface-container-low: #FAFAFA;
        --md-sys-color-surface-container: #F5F5F5;
        --md-sys-color-surface-container-high: #EEEEEE;
        --md-sys-color-surface-container-highest: #E0E0E0;
        
        --md-sys-color-outline: #BDBDBD;
        --md-sys-color-outline-variant: #E0E0E0;
      }

      /* Adjust card radius to 24px if full roundness breaks the layout */
      .light-theme {
         --theme-radius-card: 24px;
      }

      body {
        margin: 0;
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-family: var(--theme-font-body);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  </head>
  <body class="light-theme">
    <showcase-app></showcase-app>
    <script type="module" src="/src/index.css"></script>
    <script type="module" src="/src/showcase-app.ts"></script>
  </body>
</html>
