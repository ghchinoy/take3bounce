<svg xmlns="http://www.w3.org/-2000/svg" viewBox="0 0 24 24" width="100%" height="100%" fill="none">
  <!-- Background Plate (Precision Brutalism Obsidian) -->
  <rect width="24" height="24" rx="4" fill="#0e0e0f"/>
  
  <!-- Take A / Waveform Line 1 (Secondary - Purple) -->
  <rect x="5" y="10" width="3" height="4" rx="1.5" fill="#c97cff"/>
  <rect x="5" y="7" width="3" height="10" rx="1.5" fill="#c97cff" opacity="0.4"/>
  
  <!-- Take B / Waveform Line 2 (Primary - Cyan - The 'Safe' or 'Active' Take) -->
  <rect x="10.5" y="6" width="3" height="12" rx="1.5" fill="#8ff5ff"/>
  <rect x="10.5" y="3" width="3" height="18" rx="1.5" fill="#8ff5ff" opacity="0.4"/>

  <!-- Take C / Waveform Line 3 (Tertiary - Green) -->
  <rect x="16" y="8" width="3" height="8" rx="1.5" fill="#8eff71"/>
  <rect x="16" y="5" width="3" height="14" rx="1.5" fill="#8eff71" opacity="0.4"/>
</svg>
